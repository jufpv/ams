<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Espace mouvement citoyen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <header class="topbar">
      <div class="topbar-left">
        <button class="icon-btn profile-btn" type="button" aria-label="Profil" id="profileBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="8" r="3.2" />
            <path d="M5.5 19c1.4-3.2 3.8-4.8 6.5-4.8s5.1 1.6 6.5 4.8" />
          </svg>
        </button>
        <button class="icon-btn" type="button" aria-label="Paramètres" id="settingsBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3" />
            <path d="M12 3.5v2.2M12 18.3v2.2M4.9 6.5l1.6 1.6M17.5 15.9l1.6 1.6M3.5 12h2.2M18.3 12h2.2M4.9 17.5l1.6-1.6M17.5 8.1l1.6-1.6" />
          </svg>
        </button>
      </div>

      <a class="logo" href="./index.html" aria-label="Accueil">
        <span class="logo-mark">
          <img src="abeille.png" alt="" width="40" height="40" />
        </span>
      </a>

      <div class="topbar-actions">
        <button class="icon-btn" type="button" aria-label="Notifications" id="notifBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 9a6 6 0 0 1 12 0c0 7 3 7 3 7H3s3 0 3-7" />
            <path d="M10 19a2 2 0 0 0 4 0" />
          </svg>
        </button>
      </div>
    </header>

    <main>
      <section class="hero">
        <h1>Votre ruche</h1>
        <p>Gérez, organisez et faites grandir votre mouvement citoyen</p>
      </section>

      <section class="nav-grid" id="navGrid" aria-label="Navigation principale">
      </section>
    </main>

    <div class="pager" aria-hidden="true">
      <span class="dot active"></span>
      <span class="dot"></span>
    </div>
  </div>

  <aside class="drawer drawer-right" id="notifDrawer" aria-hidden="true">
    <div class="drawer-backdrop" data-close-notif-drawer></div>
    <div class="drawer-panel" role="dialog" aria-label="Notifications">
      <div class="drawer-header">
        <strong>Notifications</strong>
        <button class="icon-btn" type="button" aria-label="Fermer" data-close-notif-drawer>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <path d="M6 6l12 12M18 6L6 18" />
          </svg>
        </button>
      </div>
      <p class="drawer-empty">Aucune notification pour le moment.</p>
    </div>
  </aside>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
