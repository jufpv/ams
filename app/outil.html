<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Outil — Espace mouvement citoyen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page page-outil" hidden>
    <header class="topbar topbar-outil">
      <div class="topbar-left">
        <a class="icon-btn" href="./index.html" aria-label="Retour à l'accueil">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 6l-6 6 6 6" />
          </svg>
        </a>
      </div>

      <h1 class="outil-title" id="outilTitle">Outil</h1>

      <div class="topbar-actions">
        <button class="icon-btn" type="button" aria-label="Notifications" id="notifBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 9a6 6 0 0 1 12 0c0 7 3 7 3 7H3s3 0 3-7" />
            <path d="M10 19a2 2 0 0 0 4 0" />
          </svg>
        </button>
      </div>
    </header>

    <main class="outil-main">
      <div class="outil-toolbar">
        <label class="search-bar" for="searchInput">
          <span class="search-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="6.5" />
              <path d="M16.5 16.5L21 21" />
            </svg>
          </span>
          <input type="search" id="searchInput" placeholder="Rechercher..." autocomplete="off" />
        </label>
        <a class="btn-add-entree" id="addEntreeBtn" href="#" aria-label="Ajouter une entrée">
          <span class="btn-add-entree-icon" aria-hidden="true">+</span>
          <span class="btn-add-entree-label">Ajouter</span>
        </a>
      </div>

      <section class="entrees-list" id="outilListSection" aria-label="Liste des entrées">
        <div id="entreesBody" class="entrees-cards"></div>
        <p class="entrees-empty" id="entreesEmpty" hidden>Aucune entrée trouvée.</p>
      </section>
    </main>
  </div>

  <aside class="drawer drawer-right" id="notifDrawer" aria-hidden="true">
    <div class="drawer-backdrop" data-close-notif-drawer></div>
    <div class="drawer-panel" role="dialog" aria-label="Notifications">
      <div class="drawer-header">
        <strong>Notifications</strong>
        <button class="icon-btn" type="button" aria-label="Fermer" data-close-notif-drawer>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <path d="M6 6l12 12M18 6L6 18" />
          </svg>
        </button>
      </div>
      <p class="drawer-empty">Aucune notification pour le moment.</p>
    </div>
  </aside>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script type="module" src="outil.js"></script>
</body>
</html>
