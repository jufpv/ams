<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Outil — Espace mouvement citoyen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page page-outil" hidden>
    <header class="topbar topbar-outil">
      <div class="topbar-left">
        <button class="icon-btn" type="button" aria-label="Menu" id="menuBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <path d="M4 7h16M4 12h16M4 17h16" />
          </svg>
        </button>
        <a class="btn-home" href="./index.html">
          <span aria-hidden="true">←</span> Accueil
        </a>
      </div>

      <h1 class="outil-title" id="outilTitle">Outil</h1>

      <div class="topbar-actions">
        <button class="icon-btn" type="button" aria-label="Notifications" id="notifBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 9a6 6 0 0 1 12 0c0 7 3 7 3 7H3s3 0 3-7" />
            <path d="M10 19a2 2 0 0 0 4 0" />
          </svg>
        </button>
        <button class="icon-btn profile-btn" type="button" aria-label="Profil" id="profileBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="8" r="3.2" />
            <path d="M5.5 19c1.4-3.2 3.8-4.8 6.5-4.8s5.1 1.6 6.5 4.8" />
          </svg>
        </button>
      </div>
    </header>

    <main class="outil-main">
      <label class="search-bar" for="searchInput">
        <span class="search-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="6.5" />
            <path d="M16.5 16.5L21 21" />
          </svg>
        </span>
        <input type="search" id="searchInput" placeholder="Rechercher..." autocomplete="off" />
      </label>

      <section class="entrees-panel" aria-label="Liste des entrées">
        <div class="entrees-table" role="table" aria-label="Entrées">
          <div class="entrees-head" role="row">
            <div role="columnheader">Désignation</div>
            <div role="columnheader">Lien d'accès</div>
          </div>
          <div id="entreesBody" class="entrees-body" role="rowgroup"></div>
        </div>
        <p class="entrees-empty" id="entreesEmpty" hidden>Aucune entrée trouvée.</p>
      </section>
    </main>
  </div>

  <aside class="drawer" id="drawer" aria-hidden="true">
    <div class="drawer-backdrop" data-close-drawer></div>
    <nav class="drawer-panel" aria-label="Menu latéral">
      <div class="drawer-header">
        <strong>Menu</strong>
        <button class="icon-btn" type="button" aria-label="Fermer" data-close-drawer>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <path d="M6 6l12 12M18 6L6 18" />
          </svg>
        </button>
      </div>
      <ul>
        <li><a href="./index.html">Accueil</a></li>
        <li><a href="./profil.html">Mon profil</a></li>
        <li><a href="./parametres.html">Paramètres</a></li>
        <li><a href="#" id="logoutLink">Déconnexion</a></li>
      </ul>
    </nav>
  </aside>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script type="module" src="outil.js"></script>
</body>
</html>
